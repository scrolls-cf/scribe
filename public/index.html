<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="scribe planning dashboard for devscrolls" />
  <meta name="theme-color" content="#242933" />
  <title>scribe · devscrolls</title>
  <script>
    (function () {
      var path = location.pathname.replace(/\/$/, "");
      var specAt = path.indexOf("/specs/");
      var root = specAt >= 0 ? path.slice(0, specAt) : path;
      var base = document.createElement("base");
      base.href = (root || "") + "/";
      document.head.appendChild(base);
    })();
  </script>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23242933'/%3E%3Ctext x='16' y='22' font-family='system-ui,sans-serif' font-size='14' font-weight='700' fill='%237dd3fc' text-anchor='middle'%3Es%3C/text%3E%3C/svg%3E" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&display=swap" />
  <link rel="stylesheet" href="assets/tokens.css" />
  <link rel="stylesheet" href="assets/site.css" />
</head>

<body>
  <a class="skip-link" href="#board-main">Skip to board</a>
  <header class="scribe-header">
    <a class="scribe-brand" href=".">
      <h1 class="scribe-wordmark">scribe</h1>
      <span class="scribe-subtitle">devscrolls</span>
    </a>
  </header>

  <p id="board-error" class="banner-error" role="alert" hidden></p>

  <main class="scribe-main" id="board-main" aria-busy="true" aria-keyshortcuts="r Escape">
    <section class="scribe-panel scribe-panel--specs" aria-labelledby="specs-heading">
      <h2 id="specs-heading">Active specs <span id="spec-count" class="panel-count" hidden></span></h2>
      <p id="spec-loading" class="panel-status" role="status" aria-live="polite">Loading specs…</p>
      <ul id="spec-list" class="spec-list" role="list" hidden></ul>
      <div id="spec-empty" class="panel-empty panel-empty--idle" hidden aria-live="polite">
        <span aria-hidden="true">—</span>
        <span class="sr-only">No active specs</span>
      </div>
    </section>

    <section
      class="scribe-panel scribe-panel--detail"
      id="spec-detail-panel"
      hidden
      aria-labelledby="spec-detail-title"
    >
      <p id="spec-detail-loading" class="panel-status" role="status" aria-live="polite" hidden>Loading spec…</p>
      <article id="spec-detail" class="spec-detail-inline" hidden>
        <header class="spec-detail-head">
          <div class="spec-detail-top">
            <div class="spec-detail-identity">
              <h2 class="spec-detail-title" id="spec-detail-title">
                <span id="spec-title"></span>
              </h2>
              <p class="spec-slug" id="spec-slug"></p>
            </div>
            <div class="spec-toolbar spec-toolbar--read" id="spec-toolbar"></div>
          </div>
          <p id="spec-done-notice" class="spec-done-notice" hidden>Completed plan. Not on the active board.</p>
          <div class="phase-rail" aria-label="Phases">
            <p id="phase-empty" class="phase-rail-empty" hidden aria-live="polite">—</p>
            <ol id="phase-list" class="phase-list phase-list--rail" role="list"></ol>
          </div>
        </header>
        <div id="spec-body" class="prose"></div>
      </article>
    </section>

    <aside class="scribe-panel scribe-panel--errors" aria-labelledby="errors-heading">
      <h2 id="errors-heading">Errors board</h2>
      <p id="error-loading" class="panel-status" role="status" aria-live="polite">Loading errors…</p>
      <ul id="error-list" class="error-list" role="list" hidden></ul>
      <div id="error-empty" class="panel-empty panel-empty--clear" hidden aria-live="polite">
        Clear
        <span class="sr-only">No unresolved errors</span>
      </div>
    </aside>
  </main>

  <script type="module" src="assets/board.js"></script>
</body>

</html>
