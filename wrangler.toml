# scribe — edge store for design specs, plans, and org errors.
# Deploy: npm ci && npm run deploy

name = "scribe"
main = "src/index.ts"
compatibility_date = "2026-05-10"
workers_dev = true

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[observability]
enabled = true

[[durable_objects.bindings]]
name = "SCRIBE"
class_name = "Scribe"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Scribe"]
